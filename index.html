<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="18 Montmartre Paris — Parfumerie de niche. L'eshop est en cours de construction.">
<meta name="theme-color" content="#000000">
<title>18 Montmartre Paris — Eshop en construction</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #081f44;
    --bg-alt: #0f2f5e;
    --accent: #1d84ff;
    --accent-soft: rgba(29, 132, 255, 0.24);
    --accent-faint: rgba(29, 132, 255, 0.12);
    --beige: #d7c4a1;
    --beige-soft: rgba(215, 196, 161, 0.18);
    --surface: rgba(255, 255, 255, 0.08);
    --text: #f7f3ec;
    --text-muted: rgba(247, 243, 236, 0.72);
    --shadow: rgba(0, 0, 0, 0.32);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: radial-gradient(circle at top left, rgba(215, 196, 161, 0.14), transparent 20%),
                linear-gradient(180deg, var(--bg), var(--bg-alt));
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-family: 'Jost', sans-serif;
  }

  /* === GRILLE DES FLACONS === */
  .grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(2, 50vh);
    grid-template-rows: repeat(2, 50dvh);
    width: 100vw;
    min-height: 100vh;
    min-height: 100dvh;
    background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent 35%);
  }

  .grid-cell {
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(215, 196, 161, 0.12);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .grid-cell img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    /* Pas de filtre, pas de modification — images telles quelles */
  }

  /* Alternance des photos claires et foncées */
  .grid-cell:nth-child(-n+5) img {
    filter: brightness(1.2) contrast(1.1); /* Photos claires pour la première ligne */
  }

  .grid-cell:nth-child(n+6) img {
    filter: brightness(0.8) contrast(0.9); /* Photos foncées pour la deuxième ligne */
  }

  /* === ENCADRÉ CENTRAL === */
  .overlay {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    padding: 24px;
    pointer-events: none;
  }

  .message-box {
    background: rgba(215, 196, 161, 0.94);
    border: 1px solid var(--accent);
    padding: 70px 64px;
    text-align: center;
    max-width: 100%;
    width: 560px;
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    pointer-events: auto;
    position: relative;
    box-shadow: 0 30px 90px var(--shadow), 0 0 0 1px rgba(29, 132, 255, 0.08);
    animation: fadeIn 1.1s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  /* Coins décoratifs beige lumineux */
  .message-box::before,
  .message-box::after {
    content: '';
    position: absolute;
    width: 18px;
    height: 18px;
    border: 1px solid var(--beige);
  }
  .message-box::before {
    top: -1px;
    left: -1px;
    border-right: none;
    border-bottom: none;
  }
  .message-box::after {
    bottom: -1px;
    right: -1px;
    border-left: none;
    border-top: none;
  }

  .brand {
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--beige);
    margin-bottom: 28px;
    font-weight: 400;
  }

  .brand-number {
    font-weight: 500;
  }

  .divider {
    width: 36px;
    height: 1px;
    background: var(--beige-soft);
    margin: 0 auto 32px;
  }

  .message {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    line-height: 1.5;
    font-weight: 600;
    font-style: italic;
    color: var(--accent);
    margin-bottom: 36px;
    letter-spacing: 0.01em;
  }

  .signature {
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 300;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* === RESPONSIVE === */

  /* Tablette : 5 colonnes mais hauteur libérée */
  @media (max-width: 1100px) {
    .grid {
      grid-template-columns: repeat(5, minmax(0, 1fr));
      grid-template-rows: repeat(2, auto);
    }
    .grid-cell { aspect-ratio: 2 / 3; }
  }

  /* Mobile : passage en 2 colonnes × 5 lignes pour que les flacons restent lisibles */
  @media (max-width: 700px) {
    .grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-template-rows: repeat(5, auto);
      min-height: 100vh;
      min-height: 100dvh;
    }
    .grid-cell { aspect-ratio: 2 / 3; }

    /* Réinitialise l'alternance clair/foncé fondée sur la disposition desktop */
    .grid-cell:nth-child(-n+5) img,
    .grid-cell:nth-child(n+6) img {
      filter: none;
    }
    /* Nouvelle alternance adaptée à la grille 2×5 */
    .grid-cell:nth-child(odd) img {
      filter: brightness(1.15) contrast(1.08);
    }
    .grid-cell:nth-child(even) img {
      filter: brightness(0.85) contrast(0.95);
    }

    .overlay {
      padding: 16px;
      align-items: center;
    }
    .message-box {
      padding: 40px 26px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 16px 50px var(--shadow), 0 0 0 1px rgba(29, 132, 255, 0.08);
    }
    .message {
      font-size: 20px;
      line-height: 1.45;
      margin-bottom: 28px;
    }
    .brand {
      font-size: 11px;
      letter-spacing: 0.28em;
      margin-bottom: 22px;
    }
    .divider {
      margin-bottom: 24px;
    }
    .signature {
      font-size: 10px;
    }
  }

  /* Très petits écrans (< 380px) : on resserre encore */
  @media (max-width: 380px) {
    .message-box { padding: 32px 20px; }
    .message { font-size: 18px; }
  }
</style>
</head>
<body>

  <!-- Grille des 10 flacons (images intactes) -->
  <div class="grid" aria-hidden="true">
    <div class="grid-cell"><img src="invisible_2.png" alt=""></div>
    <div class="grid-cell"><img src="fond_invisible.png" alt=""></div>
    <div class="grid-cell"><img src="invisible_2_1_.png" alt=""></div>
    <div class="grid-cell"><img src="fond_invisible_2.png" alt=""></div>
    <div class="grid-cell"><img src="invisible_2_2_.png" alt=""></div>
    <div class="grid-cell"><img src="fond_invisible_3.png" alt=""></div>
    <div class="grid-cell"><img src="invisible_2_3_.png" alt=""></div>
    <div class="grid-cell"><img src="fond_invisible_4.png" alt=""></div>
    <div class="grid-cell"><img src="invisible_2_4_.png" alt=""></div>
    <div class="grid-cell"><img src="fond_invisible_5.png" alt=""></div>
  </div>

  <!-- Encadré central -->
  <div class="overlay">
    <div class="message-box" role="dialog">
      <div class="divider"></div>
      <p class="message">
        L'eshop est en cours de construction.<br>
        Merci pour le soutien, et à très vite !
      </p>
    </div>
  </div>

</body>
</html>
