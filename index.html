<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Site en cours de construction.">
<meta name="theme-color" content="#fafaf7">
<title>Site en cours de construction</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #fafaf7;
    --ink: #161616;
    --muted: rgba(22, 22, 22, 0.55);
    --rule: rgba(22, 22, 22, 0.12);
    --accent: #161616;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-weight: 300;
  }

  /* Trame de points subtile en arrière-plan */
  body {
    min-height: 100vh;
    min-height: 100dvh;
    display: grid;
    grid-template-columns: 1fr;
    align-items: center;
    background-image: radial-gradient(rgba(22, 22, 22, 0.07) 1px, transparent 1px);
    background-size: 22px 22px;
    background-position: 0 0;
    padding: clamp(28px, 5vw, 64px);
  }

  .wrap {
    width: 100%;
    max-width: 560px;
    margin: 0 auto;
    background: var(--bg);
    border: 1px solid var(--rule);
    padding: clamp(36px, 5vw, 64px);
    animation: fade 1s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  /* Indice numérique discret type Swiss design */
  .index {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 56px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--rule);
  }

  h1 {
    font-weight: 400;
    font-size: clamp(28px, 4.5vw, 42px);
    line-height: 1.18;
    letter-spacing: -0.015em;
    margin-bottom: 32px;
  }

  .lede {
    font-size: 15px;
    line-height: 1.7;
    color: var(--muted);
    margin-bottom: 48px;
    max-width: 420px;
  }

  /* Barre de progression animée */
  .progress {
    margin-top: 8px;
    height: 2px;
    background: var(--rule);
    position: relative;
    overflow: hidden;
  }
  .progress::after {
    content: '';
    position: absolute;
    inset: 0;
    width: 30%;
    background: var(--accent);
    animation: load 2.4s ease-in-out infinite;
  }

  .meta {
    display: flex;
    justify-content: space-between;
    margin-top: 18px;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--muted);
  }

  @keyframes load {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(450%); }
  }
  @keyframes fade {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    .progress::after, .wrap { animation: none; }
  }

  @media (max-width: 540px) {
    .index { margin-bottom: 40px; }
    .lede { margin-bottom: 36px; }
  }
</style>
</head>
<body>

  <div class="wrap">
    <div class="index">
      <span>01 / Avis</span>
      <span>FR · 2026</span>
    </div>

    <h1>Notre site est en cours de construction.</h1>
    <p class="lede">Une nouvelle version est en préparation. Nous serons de retour sous peu — merci de votre patience.</p>

    <div class="progress" aria-label="Construction en cours"></div>
    <div class="meta">
      <span>En cours</span>
      <span>Bientôt disponible</span>
    </div>
  </div>

</body>
</html>
